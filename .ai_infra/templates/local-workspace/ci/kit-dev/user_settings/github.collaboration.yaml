# github.collaboration.yaml — complete once at install
# Path: .local/user_settings/github.collaboration.yaml (gitignored)
# Role: GitHub commit + PR collaboration settings for humans and AI agents.
#
# Two surfaces (do not conflate):
#   - Git commits     → commit_provenance (Author, GitHub-User only)
#   - GitHub PR       → pr_collaboration (Action-By, Agent/s, body template)

version: 1

# ── Human owner (required) ───────────────────────────────────────────────────
owner:
  display_name: "Your Full Name"          # → Author: / Action-By:
  github_user: "@yourhandle"              # → GitHub-User: (include @)

# ── Git commit provenance ────────────────────────────────────────────────────
commit_provenance:
  # Kit policy: Author + GitHub-User only — no Assisted-by, Co-authored-by, or Made-with
  ai_disclosure_mode: none

# ── PR collaboration (GitHub + local phase artifacts) ────────────────────────
pr_collaboration:
  pipelines:
    default:
      agents:
        - review-pr
        - prepare-pr
        - merge-pr
    architecture_impacting:
      agents:
        - enterprise-auditor
        - integrator-mas-agent
        - review-pr
        - prepare-pr
        - merge-pr
      requires_alignment_artifacts: true
    infrastructure_integration:
      agents:
        - integrator-mas-agent
        - enterprise-auditor
        - review-pr
        - prepare-pr
    multi_agent_feature:
      agents:
        - implementer
        - test-runner
        - verifier
        - integrator-mas-agent
        - review-pr
        - prepare-pr
      session_pointer: .local/index-and-planning/current/session-pointer.md

  collaborators:
    humans: []

  pr_body:
    title_prefix: "feat"
    summary_heading: "## Summary"
    test_plan_heading: "## Test plan"
    collaboration_heading: "## Collaboration"
    default_test_plan:
      - "pytest -q"
      - "make gates (or project equivalent)"
    example: |
      ## Summary
      - Shared local-shell.css + site-nav.js for local HTML dashboards
      - Landing index.html; docs + folder charter updates

      ## Test plan
      - [ ] pytest -q
      - [ ] make gates

      ## Collaboration
      - Action-By: Your Full Name
      - GitHub-User: @yourhandle
      - Agent/s: review-pr | prepare-pr | merge-pr

# Author: Your Full Name
# GitHub-User: @yourhandle
