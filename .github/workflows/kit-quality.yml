name: Kit Quality

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: kit-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -q -e ".[dev,mcp]"

      - name: Seed CI workspace
        run: .venv/bin/python .ai_infra/scripts/ci/seed_kit_workspace.py --directory .

      - name: Maintainer verify-all
        # Gates step runs .ai_infra/scripts/architecture/check_governance_consistency.py
        run: make verify-all

      - name: Drift validate
        run: make drift-validate

      - name: Install dry-run
        run: make install-dry-run

      - name: Dependency audit
        run: |
          .venv/bin/pip install -q pip-audit
          .venv/bin/pip-audit

      - name: Health JSON smoke
        run: .venv/bin/python -m trae_workflow health --directory . --json
